<header class="main-header" *ngIf="showHeader">
  <!-- First Row -->
  <div class="header-top">
    <!-- Logo -->
    <div class="logo-container" routerLink="/home" tabindex="0">
      <!-- Using text since image path might vary, but styled like a logo -->
      <h1 class="logo-text">DVAGO<span class="brand-dot">.</span></h1>
    </div>

    <!-- Location Selector -->
    <div class="location-selector hide-on-mobile" tabindex="0" aria-label="Select delivery location">
      <ion-icon name="location-outline"></ion-icon>
      <div class="location-text">
        <span class="location-label">Deliver to</span>
        <span class="location-value">Select Location</span>
      </div>
      <ion-icon name="chevron-down-outline" class="chevron"></ion-icon>
    </div>

    <!-- Search Bar -->
    <div class="search-bar-container">
      <div class="search-bar">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>
        <input type="text" placeholder="Search for medicines & products..." aria-label="Search" />
      </div>
    </div>

    <!-- Actions -->
    <div class="header-actions">
      <div class="action-item hide-on-mobile" tabindex="0" aria-label="Wishlist">
        <ion-icon name="heart-outline"></ion-icon>
        <span class="action-text">Wishlist</span>
      </div>
      <div class="action-item" routerLink="/profile" tabindex="0" aria-label="Profile">
        <ion-icon name="person-outline"></ion-icon>
        <span class="action-text hide-on-mobile">Profile</span>
      </div>
      <div class="action-item cart-item" routerLink="/cart" tabindex="0" aria-label="Cart">
        <ion-icon name="cart-outline"></ion-icon>
        <span class="action-text hide-on-mobile">Cart</span>
        <ion-badge color="primary" class="cart-badge">0</ion-badge>
      </div>
    </div>
  </div>

  <!-- Second Row: Categories -->
  <div class="header-bottom hide-on-mobile">
    <nav class="category-nav">
      <ul class="category-list">
        <li class="category-item" *ngFor="let cat of categories$ | async">
          <a class="category-link" tabindex="0" [routerLink]="['/categories', cat.slug, 'products']">
            {{ cat.name }} 
            <ion-icon name="chevron-down-outline" class="cat-chevron" *ngIf="cat.children && cat.children.length > 0"></ion-icon>
          </a>
          
          <!-- Dropdown Level 1 -->
          <div class="category-dropdown" *ngIf="cat.children && cat.children.length > 0">
            <ng-container *ngTemplateOutlet="categoryTree; context: { $implicit: cat.children }"></ng-container>
          </div>
        </li>
      </ul>
    </nav>
  </div>
</header>

<!-- Recursive Template for nested categories -->
<ng-template #categoryTree let-children>
  <div class="dropdown-inner">
    <ul class="subcategory-list">
      <li class="subcategory-item" *ngFor="let sub of children" (mouseenter)="checkSubmenuBounds($event)">
        <a class="subcategory-link" tabindex="0" [routerLink]="['/categories', sub.slug, 'products']">
          <span>{{ sub.name }}</span>
          <ion-icon name="chevron-forward-outline" class="sub-chevron" *ngIf="sub.children && sub.children.length > 0"></ion-icon>
        </a>
        
        <!-- Nested Dropdown Level 2+ -->
        <div class="nested-dropdown" *ngIf="sub.children && sub.children.length > 0">
          <ng-container *ngTemplateOutlet="categoryTree; context: { $implicit: sub.children }"></ng-container>
        </div>
      </li>
    </ul>
  </div>
</ng-template>
